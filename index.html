<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="相国寺東京別院坐禅会 参韜会の公式ホームページです。">
<title>相国寺東京別院坐禅会 参韜会</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",
    "Yu Gothic","Meiryo",sans-serif;
    background:#f3f3f3;
    color:#333;
    line-height:1.7;
}

.page{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* カード */
.card{
    background:#fff;
    border-radius:28px;
    padding:40px 28px;
    margin-bottom:28px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* タイトル */

.hero{
    text-align:center;
}

.hero h1{
    margin:0;
    color:#2d5d63;
    font-size:42px;
    line-height:1.35;
}

.hero h2{
    margin:20px 0 0;
    color:#2d5d63;
    font-size:42px;
}

.teacher{
    margin-top:30px;
    font-size:18px;
    font-weight:bold;
}

/* 見出し */

.section-title{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:24px;
}

.section-title::before{
    content:"";
    width:18px;
    height:64px;
    background:#2d5d63;
}

.section-title h2{
    margin:0;
    font-size:48px;
}

/* 表 */

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #cfcfcf;
    text-align:center;
    padding:18px;
    font-size:28px;
}

th{
    background:#efefef;
}

/* 会場 */

.venue{
    margin-top:30px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#2d5d63;
}

/* 注記 */

.note{
    text-align:center;
    margin-top:10px;
    color:#666;
}

/* フッター */

footer{
    text-align:center;
    color:#666;
    padding:20px;
    font-size:18px;
}

/* スマホ */

@media(max-width:600px){

.card{
    padding:28px 16px;
}

.hero h1{
    font-size:26px;
}

.hero h2{
    font-size:26px;
}

.teacher{
    font-size:15px;
}

.section-title h2{
    font-size:24px;
}

.section-title::before{
    width:12px;
    height:44px;
}

th,td{
    padding:12px 8px;
    font-size:18px;
}

.venue{
    font-size:22px;
}
}

</style>
</head>

<body>

<div class="page">

<div class="card hero">

<h1>相国寺東京別院坐禅会</h1>

<h2>参韜会</h2>

<div class="teacher">
師家　小林玄徳老師
</div>

</div>

<div class="card">

<div class="section-title">
<h2>開催日</h2>
</div>

<table>

<tr>
<th>開催日</th>
<th>時間</th>
</tr>

<tr>
<td>2026年9月13日（日）</td>
<td>12:00～15:00</td>
</tr>

<tr>
<td>2026年10月11日（日）</td>
<td>12:00～15:00</td>
</tr>

<tr>
<td>2026年11月8日（日）</td>
<td>12:00～15:00</td>
</tr>

<tr>
<td>2026年12月13日（日）</td>
<td>休会</td>
</tr>

<tr>
<td>2027年1月10日（日）</td>
<td>12:00～15:00</td>
</tr>

<tr>
<td>2027年2月14日（日）</td>
<td>12:00～15:00</td>
</tr>

<tr>
<td>2027年3月14日（日）</td>
<td>12:00～15:00</td>
</tr>

</table>

<div class="venue">
於　相国寺東京別院
</div>

<div class="note">

</div>

</div>

<footer>
© 2026 参韜会
</footer>



</div>

</body>
</html>
